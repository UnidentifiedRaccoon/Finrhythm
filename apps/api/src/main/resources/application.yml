spring:
  application:
    name: finrhythm-api
  datasource:
    url: ${FINRHYTHM_DATABASE_URL:jdbc:postgresql://localhost:54329/finrhythm}
    username: ${FINRHYTHM_DATABASE_USERNAME:finlit}
    password: ${FINRHYTHM_DATABASE_PASSWORD:finlit_local}
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
