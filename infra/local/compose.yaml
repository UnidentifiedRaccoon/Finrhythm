name: finrhythm-local

services:
  postgres:
    image: postgres:16-alpine
    container_name: finrhythm-postgres
    environment:
      POSTGRES_DB: finrhythm
      POSTGRES_USER: finlit
      POSTGRES_PASSWORD: finlit_local
    ports:
      - "${FINRHYTHM_POSTGRES_PORT:-54329}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finlit -d finrhythm"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - finrhythm-postgres-data:/var/lib/postgresql/data

volumes:
  finrhythm-postgres-data:
